app = "gluecron"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  GIT_REPOS_PATH = "/app/repos"
  PORT = "3000"
  NODE_ENV = "production"
  # Canonical public origin. Without this, config.appBaseUrl falls back to
  # http://localhost:3000, which breaks every OAuth redirect (Google rejects
  # the callback with redirect_uri_mismatch) and points email/webhook links
  # at localhost. A Fly secret of the same name still overrides this default.
  APP_BASE_URL = "https://gluecron.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[deploy]
  release_command = "bun run db:migrate"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "gluecron_repos"
  destination = "/app/repos"
